plugins {
	id 'java'
    id 'jacoco'                                            
	id 'org.springframework.boot' version '4.1.0'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.google.protobuf' version '0.9.4'
    id 'org.owasp.dependencycheck' version '10.0.4'  
}

group = 'com.modernizer'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

// ---------- JaCoCo Coverage (Pipeline 1) ----------
jacoco {
    toolVersion = "0.8.12"
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        html.required = true
        xml.required = true
    }
}

// Enforce the 95% coverage rule
jacocoTestCoverageVerification {

    dependsOn jacocoTestReport

    // Exclude generated / config / DTO classes from the coverage denominator
    afterEvaluate {
        classDirectories.setFrom(
            files(classDirectories.files.collect {
                fileTree(dir: it, exclude: [
                    '**/config/**',
                    '**/dto/**',
                    '**/model/**',                       // records
                    '**/*Application*',                  // main class
                    '**/entity/**',
                ])
            })
        )
    }

    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value   = 'COVEREDRATIO'
                minimum = 0.95  // 95%
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification

// ---------- OWASP Dependency Check (Pipeline 2) ----------
dependencyCheck {
    failBuildOnCVSS = 7.0   // Fail build on High/Critical CVEs
    formats = ['HTML', 'JSON']
    nvd {
        apiKey = System.getenv('NVD_API_KEY')
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

ext {
    springAiVersion = '1.0.0-M3'
    grpcVersion     = '1.66.0'
    protobufVersion = '3.25.1'
}

repositories {
	mavenCentral()
	maven { url 'https://repo.spring.io/milestone' }   // needed for Spring AI M-releases
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-amqp'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'

	   // ---- Spring AI (Gemini via Vertex AI) ----
    // implementation "org.springframework.ai:spring-ai-vertex-ai-gemini-spring-boot-starter:${springAiVersion}"

    // ---- AST Parsing (Java native) ----
    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.26.2'

	  // ---- Dependency Graph ----
    implementation 'org.jgrapht:jgrapht-core:1.5.2'

    // ---- gRPC (Java <-> Node parser sidecar) ----
    implementation 'net.devh:grpc-client-spring-boot-starter:3.1.0.RELEASE'
    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"
    compileOnly 'org.apache.tomcat:annotations-api:6.0.53'   // for generated gRPC

    // ---- AWS S3 / MinIO ----
    implementation 'software.amazon.awssdk:s3:2.28.0'

    // ---- Git (GitHub repo ingestion) ----
    implementation 'org.eclipse.jgit:org.eclipse.jgit:6.10.0.202406032230-r'

    // ---- Safe ZIP handling ----
    implementation 'org.apache.commons:commons-compress:1.27.1'

    // ---- Resilience (circuit breaker, retry, rate limiter) ----
    implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'

    // ---- DB ----
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.flywaydb:flyway-core'

    // ---- Lombok ----
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // ---- Test ----
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	implementation 'org.flywaydb:flyway-database-postgresql'
	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'org.postgresql:postgresql'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-actuator-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-amqp-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-redis-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-flyway-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-validation-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testCompileOnly 'org.projectlombok:lombok'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	testAnnotationProcessor 'org.projectlombok:lombok'
    testRuntimeOnly 'com.h2database:h2'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

// ---- Protobuf / gRPC codegen ----
protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

tasks.named('test') {
	useJUnitPlatform()
}
