name: "🚀 Semantic Release"

on:
  push:
    branches: [ main ]

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false   # never cancel a release mid-flight

permissions:
  contents: write        # to create tags, releases, update changelog
  issues: write
  pull-requests: write

jobs:
  release:
    name: Automated Release & Changelog
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@8

      - name: ⚙️ Create semantic-release config
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main"],
            "plugins": [
              ["@semantic-release/commit-analyzer", {
                "preset": "conventionalcommits"
              }],
              ["@semantic-release/release-notes-generator", {
                "preset": "conventionalcommits"
              }],
              ["@semantic-release/changelog", {
                "changelogFile": "CHANGELOG.md"
              }],
              "@semantic-release/github",
              ["@semantic-release/git", {
                "assets": ["CHANGELOG.md"],
                "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
              }]
            ]
          }
          EOF

      - name: 🚀 Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release