name: "⚡ Performance Regression"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: JMH Micro-benchmarks (warn-only)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Requires the JMH Gradle plugin (me.champeau.jmh) + benchmarks in src/jmh
      - name: ⚡ Run JMH benchmarks
        run: ./gradlew jmh || echo "JMH task not configured yet — skipping"
        continue-on-error: true   # WARN-ONLY for now

      - name: 📊 Store benchmark result & compare to baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'jmh'
          output-file-path: build/results/jmh/results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Comment on the PR if performance regresses > 150%
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false   # 🔄 change to `true` once baseline is stable
          alert-comment-cc-users: '@your-username'
        continue-on-error: true