name: "🏗️ IaC & Config Security Scan"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: iac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ---------- Dockerfile & K8s manifests (Checkov) ----------
  checkov:
    name: Checkov (Dockerfile + K8s)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          # Scan Dockerfiles, Kubernetes manifests, and secrets
          framework: dockerfile,kubernetes,secrets
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false   # 🔒 fail on misconfigs

      - name: 📤 Upload Checkov results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ---------- Kubernetes best-practices linter ----------
  kube-linter:
    name: KubeLinter (K8s manifests)
    runs-on: ubuntu-latest
    # Only run if you have a k8s/ directory
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run KubeLinter
        uses: stackrox/kube-linter-action@v1.0.5
        with:
          directory: k8s/          # 👈 adjust to your manifests path
          format: sarif
          output-file: kube-linter.sarif
        continue-on-error: true    # set false once you have manifests

      - name: 📤 Upload KubeLinter results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kube-linter.sarif
          category: kube-linter
        continue-on-error: true