  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 4 · SLOW / EXPENSIVE (only run if everything cheaper passed)     │
  # └──────────────────────────────────────────────────────────────────────┘

  trivy-scan:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4
      - name: 📥 Download image
        uses: actions/download-artifact@v4
        with: { name: docker-image }
      - name: 🐳 Load image
        run: docker load -i image.tar
      - name: 🔎 Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'orchestrator-service:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: 📤 Upload
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

