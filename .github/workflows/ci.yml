  #    runs-on: ubuntu-latest
  #    steps:
  #      - uses: actions/checkout@v4
  #      - uses: actions/setup-java@v4
  #        with: { distribution: 'temurin', java-version: '21' }
  #      - uses: gradle/actions/setup-gradle@v4
  #      - name: 🎨 Spotless check
  #        run: ./gradlew spotlessCheck

  secret-scan:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 🔑 Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 1 · COMPILE — the gate for ALL heavy downstream work             │
  # └──────────────────────────────────────────────────────────────────────┘

  compile:
    name: "Compile (JDK 21)"
    runs-on: ubuntu-latest
    needs: [ secret-scan ]   # format-check is commented out; depend only on active jobs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: 🏗️ Compile (detailed logs)
        id: compile
        run: |
          set -o pipefail
          mkdir -p build
          ./gradlew clean compileJava -x test --warning-mode all --stacktrace --debug --scan 2>&1 | tee build/ci-compile.log
        continue-on-error: true

      - name: 📤 Upload compile logs (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-compile-logs
          path: |
            build/ci-compile.log
            build/reports/problems/

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 2 · PARALLEL FAST CHECKS (all depend on compile succeeding)      │
  # └──────────────────────────────────────────────────────────────────────┘

  unit-tests:
    name: "Tests + 95% Coverage"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4

      - name: 🧪 Test + coverage report
        run: ./gradlew test jacocoTestReport

      - name: 🔒 Enforce 95% coverage
        run: ./gradlew jacocoTestCoverageVerification

      - name: 📉 Report coverage on changed files
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 95
          min-coverage-changed-files: 95
          title: "📊 Coverage"

      - name: 📤 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

