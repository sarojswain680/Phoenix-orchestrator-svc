  ai-review:
    name: "Claude AI Review"
    runs-on: ubuntu-latest
    needs: [ unit-tests, spotbugs ]   # only spend AI $ on code that passes basics
    if: github.event_name == 'pull_request'   # PR-only (needs PR context vars)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: 🤖 Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          BASE_SHA:          ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          CLAUDE_MODEL:      "claude-sonnet-4-5"
        run: python .github/scripts/claude_review.py

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 5 · FINAL GATE — single check for branch protection to require   │
  # └──────────────────────────────────────────────────────────────────────┘

  ci-success:
    name: "✅ CI Success Gate"
    runs-on: ubuntu-latest
    if: always()   # run even if something failed, so we can report accurately
    needs:
      - secret-scan
      - compile
      - unit-tests
      - spotbugs
      - codeql
      - license-scan
      - iac-scan
      - build-image
      - trivy-scan
      - sbom
      - mutation-test
      - owasp-deps
      - ai-review
    steps:
      - name: 🎯 Verify all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI gates passed!"