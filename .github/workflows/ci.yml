name: "🚀 CI Pipeline"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, edited ]
  push:
    branches: [ main ]

# Cancel superseded runs on the same PR to save compute
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write
  checks: read
  statuses: write

# ==============================================================================
# ⚠️  MAINTENANCE NOTE — RE-ENABLING DISABLED JOBS
# ------------------------------------------------------------------------------
# Several jobs are temporarily disabled (see "DISABLED JOBS" section at the
# bottom). When you re-enable a job, you MUST also add it back to:
#   1. Any downstream job's `needs:` list, AND
#   2. The final `ci-success` job's `needs:` list.
# Otherwise GitHub will reject the workflow (a `needs:` pointing to a
# non-existent job = invalid workflow = nothing runs, nothing shows in UI).
# ==============================================================================

jobs:

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 0 · CHEAP GATES (seconds) — fail here before spending anything   │
  # └──────────────────────────────────────────────────────────────────────┘

  secret-scan:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 🔑 Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 1 · COMPILE — the gate for ALL heavy downstream work             │
  # └──────────────────────────────────────────────────────────────────────┘

  compile:
    name: "Compile (JDK 21)"
    runs-on: ubuntu-latest
    needs: [ secret-scan ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: 🏗️ Compile (detailed logs)
        id: compile
        run: |
          set -o pipefail
          mkdir -p build
          ./gradlew clean compileJava -x test --warning-mode all --stacktrace 2>&1 | tee build/ci-compile.log

      - name: 📤 Upload compile logs (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-compile-logs
          path: |
            build/ci-compile.log
            build/reports/problems/

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 2 · PARALLEL FAST CHECKS (depend on compile succeeding)          │
  # └──────────────────────────────────────────────────────────────────────┘

  unit-tests:
    name: "Tests + 95% Coverage"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4

      - name: 🧪 Test + coverage report
        run: ./gradlew test jacocoTestReport

      - name: 🔒 Enforce 95% coverage
        run: ./gradlew jacocoTestCoverageVerification

      - name: 📉 Report coverage on changed files
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 95
          min-coverage-changed-files: 95
          title: "📊 Coverage"

      - name: 📤 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

  codeql:
    name: "CodeQL SAST"
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: 🧬 Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-extended
      - name: 🏗️ Build for analysis
        run: ./gradlew compileJava -x test
      - name: 🔎 Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

  iac-scan:
    name: "IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: [ secret-scan ]
    steps:
      - uses: actions/checkout@v4
      - name: 🏗️ Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,kubernetes,secrets
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false
      - name: 📤 Upload
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 4 · AI REVIEW (PR-only)                                          │
  # └──────────────────────────────────────────────────────────────────────┘

  ai-review:
    name: "Claude AI Review"
    runs-on: ubuntu-latest
    needs: [ unit-tests ]              # NOTE: re-add 'spotbugs' here when re-enabled
    if: github.event_name == 'pull_request'   # PR-only (needs PR context vars)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: 🤖 Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          BASE_SHA:          ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          CLAUDE_MODEL:      "claude-sonnet-4-5"
        run: python .github/scripts/claude_review.py

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 5 · FINAL GATE — single check for branch protection to require   │
  # │ IMPORTANT: only list ACTIVE jobs here. Re-add jobs as you enable them. │
  # └──────────────────────────────────────────────────────────────────────┘

  ci-success:
    name: "✅ CI Success Gate"
    runs-on: ubuntu-latest
    if: always()   # run even if something failed, so we can report accurately
    needs:
      - secret-scan
      - compile
      - unit-tests
      - codeql
      - iac-scan
      - ai-review
      # ---- Re-add these as you re-enable the jobs below ----
      # - spotbugs
      # - license-scan
      # - build-image
      # - trivy-scan
      # - sbom
      # - mutation-test
      # - owasp-deps
    steps:
      - name: 🎯 Verify all jobs succeeded
        run: |
          # 'ai-review' is skipped on push events — treat 'skipped' as OK.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI gates passed!"

