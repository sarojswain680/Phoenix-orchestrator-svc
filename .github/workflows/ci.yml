name: "🚀 CI Pipeline"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, edited ]
  push:
    branches: [ main ]

# Cancel superseded runs on the same PR to save compute
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write
  checks: read
  statuses: write

# ==============================================================================
# Reusable setup is repeated per job because GitHub jobs run on separate runners.
# Gradle caching (setup-gradle) makes repeated setups cheap.
# ==============================================================================

jobs:

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │ STAGE 0 · CHEAP GATES (seconds) — fail here before spending anything   │
  # └──────────────────────────────────────────────────────────────────────┘

