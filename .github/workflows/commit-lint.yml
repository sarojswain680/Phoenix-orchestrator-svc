name: "✅ Conventional Commit Lint"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, edited, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------- Validate the PR TITLE follows Conventional Commits ----------
  pr-title:
    name: PR Title Lint
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a letter.

  # ---------- Validate all COMMITS in the PR ----------
  commits:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19

      - name: 📝 Create commitlint config
        run: echo "export default { extends: ['@commitlint/config-conventional'] };" > commitlint.config.mjs

      - name: ✅ Lint commits in PR range
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose