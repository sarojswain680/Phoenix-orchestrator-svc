name: "🧬 CodeQL SAST"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  # Also run on push to main to keep the security dashboard current
  push:
    branches: [ main ]
  schedule:
    # Weekly deep scan (catches newly-published CodeQL queries)
    - cron: '0 3 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CodeQL needs these to read code and write security results
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze Java (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🧬 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # security-extended adds more queries (path traversal, injection, etc.)
          # Perfect for our untrusted-input threat model.
          queries: security-extended,security-and-quality

      # Autobuild attempts to compile; explicit build is more reliable for Gradle
      - name: 🏗️ Build for analysis
        run: ./gradlew clean compileJava -x test

      - name: 🔎 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          # Fail the PR if High or Critical alerts are found
          upload: true