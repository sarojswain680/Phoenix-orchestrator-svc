name: "🔒 DevSecOps & Secret Scan"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- SECRET SCANNING ----------
  gitleaks:
    name: 🔑 Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code (full history)
        uses: actions/checkout@v4
        with:
          # Full history needed so Gitleaks can scan all PR commits
          fetch-depth: 0

      - name: 🔍 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE is only needed for GitHub Organizations (not personal repos)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ---------- DEPENDENCY VULNERABILITY SCAN ----------
  dependency-check:
    name: 🛡️ OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🛡️ Run OWASP Dependency Check
        # Requires the OWASP plugin in build.gradle (see bottom)
        run: ./gradlew dependencyCheckAnalyze
        env:
          # NVD API key speeds up scans dramatically. Get one free at:
          # https://nvd.nist.gov/developers/request-an-api-key
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: 📤 Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: build/reports/dependency-check-report.html