name: "🎨 P1 · Quality Gate (Format + Bugs)"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    name: Spotless + SpotBugs + PMD
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🎨 Check code formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: 🐛 Run SpotBugs + FindSecBugs
        run: ./gradlew spotbugsMain

      - name: 📤 Upload SpotBugs SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/spotbugs/main.sarif
          category: spotbugs

      - name: 📤 Upload SpotBugs HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/main.html