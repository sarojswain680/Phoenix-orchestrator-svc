name: "🛠️ Build, Test & Coverage Gate (95%)"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-gate:
    name: Test & 95% Coverage (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🏗️ Compile
        run: ./gradlew clean compileJava

      - name: 🧪 Run tests + coverage report
        run: ./gradlew test jacocoTestReport

      - name: 🔒 Enforce 95% coverage (fails PR if below)
        run: ./gradlew jacocoTestCoverageVerification

      - name: 📊 Publish coverage summary to PR
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 95
          min-coverage-changed-files: 95
          title: "📊 JaCoCo Coverage Report"

      - name: 📤 Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: build/reports/jacoco/test/html/

      - name: 📉 Enforce 95% coverage on CHANGED files
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 95
          min-coverage-changed-files: 95   # 🔒 fails if new/changed code < 95%
          title: "📊 JaCoCo Coverage (Overall + Changed Files)"
          update-comment: true