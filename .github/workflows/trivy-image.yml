name: "🐳 Trivy Container Scan"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # to upload SARIF to Security tab

jobs:
  # ---------- Scan the built application image ----------
  image-scan:
    name: Scan Docker Image (CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the app JAR + a container image locally (no push needed for scanning)
      - name: 🏗️ Build bootJar
        run: ./gradlew clean bootJar -x test

      - name: 🐳 Build Docker image
        run: docker build -t orchestrator-service:${{ github.sha }} .

      - name: 🔎 Trivy scan (image + OS packages + libs)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'orchestrator-service:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image.sarif'
          # 🔒 FAIL the build on Critical/High vulns that have a fix available
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true    # don't block on CVEs with no patch yet
          vuln-type: 'os,library'

      - name: 📤 Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'

  # ---------- Scan the filesystem/config for misconfigs & secrets ----------
  fs-scan:
    name: Scan Filesystem & IaC
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔎 Trivy filesystem scan (misconfig + secrets)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,misconfig,secret'
          exit-code: '1'

      - name: 📤 Upload FS scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'