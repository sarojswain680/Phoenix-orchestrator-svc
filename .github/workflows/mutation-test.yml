name: "🧟 Mutation Testing (PITest)"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    name: PITest (70% kill threshold)
    runs-on: ubuntu-latest
    # Mutation testing is slow — keep it in its own job so it never
    # blocks fast feedback from unit tests / linting.
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🧟 Run PITest
        run: ./gradlew pitest

      - name: 📤 Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitest-report
          path: build/reports/pitest/