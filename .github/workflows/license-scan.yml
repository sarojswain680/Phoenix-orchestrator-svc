name: "⚖️ License Compliance"

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: license-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license-check:
    name: License Gate (block copyleft)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Requires the com.github.jk1.dependency-license-report plugin
      - name: ⚖️ Generate & check license report
        run: ./gradlew checkLicense

      - name: 📤 Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: build/reports/dependency-license/