server:
  port: 8080

spring:
  application:
    name: orchestrator-service

  # Enable virtual threads to process long AI streaming responses efficiently
  threads:
    virtual:
      enabled: true

  # Datastore Configuration — all secrets externalized via env vars
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:modernizer}
    username: ${POSTGRES_USER:modernizer}
    password: ${POSTGRES_PASSWORD:modernizer}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # SAFE default. NEVER create-drop outside the 'test' profile (data loss).
      # Schema is owned by Flyway migrations.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Flyway owns all schema changes (versioned, auditable)
  flyway:
    enabled: true

  # Temporary autoconfig exclusions for local compiling without services
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # Warm-tier cache (Redis) — externalized
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Event broker (RabbitMQ) — externalized
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  # Spring Boot 4.1 Native gRPC Client configuration
  grpc:
    client:
      parser-sidecar:
        address: static://${GRPC_SIDECAR_HOST:localhost}:${GRPC_SIDECAR_PORT:50051}
        # plaintext for LOCAL dev only. Production overrides to 'tls' (see application-prod.yml)
        negotiation-type: plaintext

  # ── Portable Spring AI 2.0 Configuration ──
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL:deepseek-r1:8b}
          temperature: 0.1  # Low temperature for strict, deterministic JSON parsing

    # Production Cloud AI Core (Vertex AI / Gemini) - Kept as sibling
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT:dummy}
          location: us-central1
          chat:
            options:
              model: gemini-2.5-pro
              temperature: 0.1

# Resilience Gates (Circuit Breaker & Retries)
resilience4j:
  circuitbreaker:
    instances:
      sidecar:
        slidingWindowSize: 10
        failureRateThreshold: 50
      geminiAgent:
        slidingWindowSize: 10
        failureRateThreshold: 50
  retry:
    instances:
      sidecar:
        maxAttempts: 3
        waitDuration: 2s
      geminiAgent:
        maxAttempts: 3
        waitDuration: 2s

# External Object Storage (S3 / MinIO) — externalized
storage:
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
    bucket: ${STORAGE_S3_BUCKET:legacy-artifacts}
    access-key: ${STORAGE_S3_ACCESS_KEY:}
    secret-key: ${STORAGE_S3_SECRET_KEY:}
