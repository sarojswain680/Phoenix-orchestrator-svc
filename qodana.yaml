#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
#################################################################################
#              WARNING: Do not store sensitive information in this file,         #
#               as its contents will be included in the Qodana report.          #
#################################################################################
version: "1.0"

# Stronger profile than qodana.starter for a security-sensitive service
profile:
  name: qodana.recommended

# Skip generated code, build artifacts, and wrapper scripts
exclude:
  - name: All
    paths:
      - build
      - .gradle
      - "**/generated-sources"
      - "**/build/generated"

projectJDK: "21"

# Quality gate — fails CI when thresholds are exceeded.
# NOTE: testCoverageThresholds require Qodana Ultimate. Left commented
# because this project uses the JVM Community linter (see 'linter' below).
failureConditions:
  severityThresholds:
    critical: 0
    any: 15
#  testCoverageThresholds:   # Ultimate/Ultimate Plus only
#    fresh: 70
#    total: 50

linter: jetbrains/qodana-jvm-community:2026.1
